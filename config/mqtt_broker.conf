# mosquitto MQTT Broker 配置文件
# 用于 Edge AI Agent Gateway 项目
#
# 部署: 将此文件放在 /etc/mosquitto/conf.d/edge_gateway.conf
# 重启: systemctl restart mosquitto

# -------- 监听端口 --------
listener 1883 0.0.0.0
# listener 8883 0.0.0.0  # TLS (生产环境启用)

# -------- 持久化 --------
persistence true
persistence_location /var/lib/mosquitto/
autosave_interval 300

# -------- 日志 --------
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
connection_messages true

# -------- ACL (生产环境启用) --------
# acl_file /etc/mosquitto/acl.conf

# -------- 密码认证 (生产环境启用) --------
# password_file /etc/mosquitto/passwd
# allow_anonymous false

# -------- 桥接到云端 (可选, 对接阿里云/华为云 IoT) --------
# connection cloud-bridge
# address YOUR_CLOUD_IOT_ENDPOINT:1883
# topic edge/# out 1
# topic cmd/# in 1
