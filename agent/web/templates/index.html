<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI Agent — 智能家居管家</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #0f3460;
            --text: #eaeaea;
            --green: #00d2a0;
            --yellow: #ffd700;
            --red: #ff6b6b;
            --chat-user: #2d4a7a;
            --chat-agent: #1e3a5f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ====== 侧边栏 ====== */
        .sidebar {
            width: 280px;
            background: var(--card);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-right: 1px solid var(--accent);
            flex-shrink: 0;
        }

        .sidebar h1 {
            font-size: 1.3em;
            color: var(--green);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: var(--accent);
            border-radius: 10px;
            padding: 16px;
        }

        .card h3 {
            font-size: 0.9em;
            color: #8ab4f8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sensor-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sensor-value { font-weight: bold; font-size: 1.1em; }
        .sensor-value.hot { color: var(--red); }
        .sensor-value.warm { color: var(--yellow); }
        .sensor-value.normal { color: var(--green); }

        .rule-item {
            font-size: 0.85em;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .rule-item .delete-btn {
            background: var(--red);
            border: none;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            line-height: 1;
        }

        /* ====== 主聊天区 ====== */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 16px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--accent);
            font-size: 0.9em;
            color: #8ab4f8;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: var(--chat-user);
            border-bottom-right-radius: 4px;
        }

        .message.agent {
            align-self: flex-start;
            background: var(--chat-agent);
            border-bottom-left-radius: 4px;
        }

        .message.alert {
            align-self: center;
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid var(--red);
            font-size: 0.9em;
            max-width: 90%;
        }

        .chat-input-area {
            padding: 16px 24px;
            background: var(--card);
            border-top: 1px solid var(--accent);
            display: flex;
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg);
            border: 1px solid var(--accent);
            border-radius: 24px;
            color: var(--text);
            font-size: 1em;
            outline: none;
            transition: border 0.2s;
        }

        .chat-input-area input:focus {
            border-color: var(--green);
        }

        .chat-input-area button {
            padding: 12px 24px;
            background: var(--green);
            border: none;
            border-radius: 24px;
            color: #1a1a2e;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .chat-input-area button:hover { opacity: 0.85; }
        .chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }

        .typing-indicator {
            align-self: flex-start;
            padding: 8px 16px;
            color: #8ab4f8;
            font-size: 0.85em;
            display: none;
        }
        .typing-indicator.active { display: block; }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.online { background: var(--green); }
        .status-dot.offline { background: var(--red); }
    </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
    <h1>🏠 智能管家</h1>

    <div class="card">
        <h3>🌡 传感器</h3>
        <div id="sensor-panel">

            <div class="sensor-row">
                <span>温度</span>
                <span class="sensor-value warm" id="val-temp">--°C</span>
            </div>

            <div class="sensor-row">
                <span>湿度</span>
                <span class="sensor-value normal" id="val-hum">--%</span>
            </div>

            <div class="sensor-row">
                <span>光照</span>
                <span class="sensor-value normal" id="val-light">--lx</span>
            </div>
            <div class="sensor-row">
                <span>PM2.5 空气质量</span>
                <span class="sensor-value normal" id="val-pm25">--μg/m³</span>
            </div>
        </div>
    </div>

    <div class="card" style="padding: 20px 18px;">
    <h3 style="margin-top:0;margin-bottom:12px;">⚡ 自动化规则</h3>
    <div id="rules-panel" style="color:#eee;font-size:0.9em;line-height:1.7;">
         <strong>热响应规则</strong>：当室内温度超过28°C时，系统会建议开启风扇以增加通风和降温。

    </div>
</div>

    <div class="card">
        <h3>📡 连接状态</h3>
        <div style="font-size:0.85em;">
            <span class="status-dot online" id="status-dot"></span>
            <span id="status-text">MQTT: 连接中...</span>
        </div>
    </div>
</aside>

<!-- 主聊天区 -->
<main class="main">
    <div class="chat-header">
        与智能管家对话 — 试着说 "现在温度多少" 或 "帮我把客厅灯打开"
    </div>

    <div class="chat-messages" id="chat-messages">
        <div class="message agent">
            你好！我是你的智能家居管家 👋<br>
            我可以帮你查看温湿度、控制灯光和家电、创建自动化规则。试试跟我说说你的需求吧！
        </div>
    </div>

    <div class="typing-indicator" id="typing">🤔 正在思考...</div>

    <div class="chat-input-area">
        <input id="chat-input" type="text"
               placeholder="输入指令..."
               autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">发送</button>
    </div>
</main>

<script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
<script>
// ========== WebSocket ==========
const socket = io();

socket.on("connect", () => {
    console.log("WebSocket 已连接");
});

socket.on("sensor_update", (data) => {
    updateSensorPanel(data.data);
});

socket.on("alert", (data) => {
    addMessage("alert", `⚠️ ${data.message}`);
});

socket.on("typing", (data) => {
    const indicator = document.getElementById("typing");
    indicator.classList.toggle("active", data.status);
});

socket.on("chat_response", (data) => {
    addMessage("agent", data.message);
});

socket.on("chat_error", (data) => {
    addMessage("alert", `❌ ${data.message}`);
});

// ========== 消息显示 ==========
function addMessage(role, text) {
    const container = document.getElementById("chat-messages");
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// ========== 发送消息 ==========
function sendMessage() {
    const input = document.getElementById("chat-input");
    const btn = document.getElementById("send-btn");
    const text = input.value.trim();

    if (!text) return;

    addMessage("user", text);
    input.value = "";
    input.focus();

    btn.disabled = true;

    // 同时支持 HTTP 和 WebSocket
    socket.emit("chat", { message: text });

    // 备用: HTTP POST
    fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
    })
    .then(r => r.json())
    .then(data => {
        // 如果 WebSocket 已经显示了就不要重复
        // (简单处理: WebSocket 优先, HTTP 是 fallback)
    })
    .catch(err => {
        addMessage("alert", `网络错误: ${err.message}`);
    })
    .finally(() => {
        btn.disabled = false;
    });
}

// Enter 键发送
document.getElementById("chat-input").addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
});

// ========== 传感器更新 ==========
function updateSensorPanel(data) {
    if (data.temperature) {
        const temp = data.temperature.value || data.temperature;
        const el = document.getElementById("val-temp");
        el.textContent = `${temp}°C`;
        el.className = "sensor-value";
        if (temp > 28) el.classList.add("hot");
        else if (temp > 22) el.classList.add("warm");
        else el.classList.add("normal");
    }
    if (data.humidity) {
        const hum = data.humidity.value || data.humidity;
        const el = document.getElementById("val-hum");
        el.textContent = `${hum}%`;
    }
    if (data.illuminance) {
        const lux = data.illuminance.value || data.illuminance;
        const el = document.getElementById("val-light");
        el.textContent = `${lux} lx`;
    }
    // ======== 新增 PM2.5 空气质量解析 ========
    if (data.pm25 !== undefined) {
        const pm = data.pm25.value || data.pm25;
        const pmEl = document.getElementById("val-pm25");
        pmEl.textContent = `${pm} μg/m³`;
        pmEl.className = "sensor-value";
        // 国标空气质量分级
        if (pm <= 35) {
            pmEl.classList.add("normal"); // 优 绿色
        } else if (pm <= 75) {
            pmEl.classList.add("warm");  // 良 黄色
        } else {
            pmEl.classList.add("hot");   // 污染 红色
        }
    }
}

// ========== 定时轮询状态 ==========
setInterval(async () => {
    try {
        const resp = await fetch("/api/status");
        const data = await resp.json();

        // 更新传感器
        if (data.sensors) updateSensorPanel(data.sensors);

        // 更新连接状态
        const dot = document.getElementById("status-dot");
        const text = document.getElementById("status-text");
        if (data.mqtt_connected) {
            dot.className = "status-dot online";
            text.textContent = "MQTT: 已连接";
        } else {
            dot.className = "status-dot offline";
            text.textContent = "MQTT: 断开";
        }
    } catch(e) {
        console.error("状态轮询失败:", e);
    }
}, 5000);

// ========== 加载规则 ==========
async function loadRules() {
    try {
        const resp = await fetch("/api/rules");
        const rules = await resp.json();
        const panel = document.getElementById("rules-panel");

        // 没有规则时保持页面原有内容，不覆盖
        if (!rules || rules.length === 0) {
            return;
        }

        panel.innerHTML = rules.map(r => `
            <div class="rule-item">
                <span>${r.description}</span>
                <button class="delete-btn" onclick="deleteRule('${r.id}')">×</button>
            </div>
        `).join("");
    } catch(e) {
        console.error("加载规则失败:", e);
    }
}

async function deleteRule(id) {
    await fetch(`/api/rules/${id}`, { method: "DELETE" });
    loadRules();
}

loadRules();
setInterval(loadRules, 30000);  // 30s 刷新一次规则
</script>
</body>
</html>
